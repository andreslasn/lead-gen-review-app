a:hover,
a:active {

.noFormatLink {

}
.noFormatLink:hover,
.noFormatLink:active {
  color: black;
  text-decoration: none;
}
.input {
  border: none;
}
.input:visited,
.input:focus {
  box-shadow: 0 0 0px 0.2rem hsla(0, 0%, 0%, 0.3) !important;
}
.centerAlignText {
  text-align: center;
}
.marginBottom {
  margin-bottom: 10px;
}
.extraMarginBottom {
  margin-bottom: 30px;
}
.flexContainer {
  display: -ms-flex;
  display: -webkit-flex;
  display: flex;
}
.tooltip > .tooltip-inner {
  background-color: var(--tooltipBackgroundColor, #272727);
  color: var(--tooltipFontColor, white);
  border: 2px solid var(--tooltipBorderColor, black);
  box-shadow: 0 0 5px 0.2rem hsla(0, 0%, 0%, 0.3) !important;
}
.bs-tooltip-auto[x-placement^='bottom'] .arrow::before,
.bs-tooltip-bottom .arrow::before {
  border-bottom-color: var(--tooltipBorderColor, black);
}
.bs-tooltip-auto[x-placement^='top'] .arrow::before,
.bs-tooltip-top .arrow::before {
  border-top-color: var(--tooltipBorderColor, black);
}
.bs-tooltip-auto[x-placement^='left'] .arrow::before,
.bs-tooltip-left .arrow::before {
  border-left-color: var(--tooltipBorderColor, black);
}
.bs-tooltip-auto[x-placement^='right'] .arrow::before,
.bs-tooltip-right .arrow::before {
  border-right-color: var(--tooltipBorderColor, black);
}
.map__container {
  height: 400px;
  width: 100%;
  border: 1px solid grey;
  border-radius: 5px;
  margin: 10px 0px;
}
.map__icon {
  height: 75%;
  width: 75%;
}
.request-popup .leaflet-popup-content-wrapper {
  width: 100%;
}
.leaflet-popup-content {
  margin: 5px 25px 5px 5px;
  line-height: 1.5;
  max-width: 245px;
  min-width: 230px;
}
.map__link {
  color: var(--primaryColor) !important;
}
.map__link:hover,
.map__link:active {
  color: var(--primaryColorDark) !important;
}
.map__me {
  margin: 10px;
}
.actionButton {
  background-color: var(--primaryColor);
  border-radius: 5px;
  border: none !important;
  min-width: 75px;
}
.actionButton--disabled {
  background-color: var(--disabledColor, lightgrey) !important;
  border: none !important;
  min-width: 75px;
}
.closeButton {
  border: none !important;
  min-width: 75px;
}
.fullWidth {
  width: 100%;
}
.textButton {
  margin: 5px;
}
.mapButton {
  width: 30px;
  height: 30px;
  align-items: center;
  background-color: white;
  box-shadow: 0 0 5px 0.2rem hsla(0, 0%, 0%, 0.1) !important;
  border: 1px solid grey !important;
  padding: 0px;
  margin: 0px 0px 2px 0px;
  vertical-align: middle;
}
.mapButton:hover,
.mapButton:active,
.mapButton:visited,
.mapButton:focus {
  background-color: #dfdfdf !important;
  box-shadow: 0 0 5px 0.2rem hsla(0, 0%, 0%, 0.1) !important;
}
.mapIcon {
  margin: 4px 0px 0px 0px;
  color: black;
}
.searchButton {
  background-color: var(--primaryColorLight);
  border-radius: 5px;
  border: none !important;
}
.searchButton:hover,
.searchButton:active,
.actionButton:hover,
.actionButton:active {
  background-color: var(--primaryColorDark) !important;
}
.searchButton:visited,
.searchButton:focus,
.actionButton:visited,
.actionButton:focus {
  box-shadow: 0 0 0px 0.2rem hsla(0, 0%, 0%, 0.3) !important;

  color: var(--primaryColor);

a:hover,

  color: var(--primaryColorDark);

.noFormatLink {
  color: black;
}
.noFormatLink:hover,
.noFormatLink:active {
  color: black;
  text-decoration: none;
}
.input {
  border: none;
}
.input:visited,
.input:focus {
  box-shadow: 0 0 0px 0.2rem hsla(0, 0%, 0%, 0.3) !important;
}
.centerAlignText {
  text-align: center;
}
.marginBottom {
  margin-bottom: 10px;
}
.extraMarginBottom {
  margin-bottom: 30px;
}
.flexContainer {
  display: -ms-flex;
  display: -webkit-flex;
  display: flex;
}
.tooltip > .tooltip-inner {
  background-color: var(--tooltipBackgroundColor, #272727);
  color: var(--tooltipFontColor, white);
  border: 2px solid var(--tooltipBorderColor, black);
  box-shadow: 0 0 5px 0.2rem hsla(0, 0%, 0%, 0.3) !important;
}
.bs-tooltip-auto[x-placement^='bottom'] .arrow::before,
.bs-tooltip-bottom .arrow::before {
  border-bottom-color: var(--tooltipBorderColor, black);
}
.bs-tooltip-auto[x-placement^='top'] .arrow::before,
.bs-tooltip-top .arrow::before {
  border-top-color: var(--tooltipBorderColor, black);
}
.bs-tooltip-auto[x-placement^='left'] .arrow::before,
.bs-tooltip-left .arrow::before {
  border-left-color: var(--tooltipBorderColor, black);
}
.bs-tooltip-auto[x-placement^='right'] .arrow::before,
.bs-tooltip-right .arrow::before {
  border-right-color: var(--tooltipBorderColor, black);
}
.map__container {
  height: 400px;
  width: 100%;
  border: 1px solid grey;
  border-radius: 5px;
  margin: 10px 0px;
}
.map__icon {
  height: 75%;
  width: 75%;
}
.request-popup .leaflet-popup-content-wrapper {
  width: 100%;
}
.leaflet-popup-content {
  margin: 5px 25px 5px 5px;
  line-height: 1.5;
  max-width: 245px;
  min-width: 230px;
}
.map__link {
  color: var(--primaryColor) !important;
}
.map__link:hover,
.map__link:active {
  color: var(--primaryColorDark) !important;
}
.map__me {
  margin: 10px;
}
.breadCrumb {
  display: -ms-flexbox;
  display: flex;
  padding: 0.75rem 0.5rem;
  margin-bottom: 0.5rem;
  list-style: none;
  background-color: var(--secondaryColor, hsl(0, 0%, 93%));
  border-radius: 0;
  overflow-x: auto;
  white-space: pre;
}
.breadcrumb-item + .breadcrumb-item {
  padding-left: 0.2rem;
}
.breadcrumb-item + .breadcrumb-item::before {
  display: inline-block;
  padding-right: 0.2rem;
  color: #6c757d;
  content: '/';

  color: black;
}
.noFormatLink:hover,
.noFormatLink:active {
  color: black;
  text-decoration: none;

.input {
  border: none;
}
.input:visited,
.input:focus {
  box-shadow: 0 0 0px 0.2rem hsla(0, 0%, 0%, 0.3) !important;
}
.centerAlignText {
  text-align: center;
}
.marginBottom {
  margin-bottom: 10px;
}
.extraMarginBottom {
  margin-bottom: 30px;
}
.flexContainer {
  display: -ms-flex;
  display: -webkit-flex;
  display: flex;
}
.tooltip > .tooltip-inner {
  background-color: var(--tooltipBackgroundColor, #272727);
  color: var(--tooltipFontColor, white);
  border: 2px solid var(--tooltipBorderColor, black);
  box-shadow: 0 0 5px 0.2rem hsla(0, 0%, 0%, 0.3) !important;
}
.bs-tooltip-auto[x-placement^='bottom'] .arrow::before,
.bs-tooltip-bottom .arrow::before {
  border-bottom-color: var(--tooltipBorderColor, black);
}
.bs-tooltip-auto[x-placement^='top'] .arrow::before,
.bs-tooltip-top .arrow::before {
  border-top-color: var(--tooltipBorderColor, black);
}
.bs-tooltip-auto[x-placement^='left'] .arrow::before,
.bs-tooltip-left .arrow::before {
  border-left-color: var(--tooltipBorderColor, black);
}
.bs-tooltip-auto[x-placement^='right'] .arrow::before,
.bs-tooltip-right .arrow::before {
  border-right-color: var(--tooltipBorderColor, black);
}
.map__container {
  height: 400px;
  width: 100%;
  border: 1px solid grey;
  border-radius: 5px;
  margin: 10px 0px;
}
.map__icon {
  height: 75%;
  width: 75%;
}
.request-popup .leaflet-popup-content-wrapper {
  width: 100%;
}
.leaflet-popup-content {
  margin: 5px 25px 5px 5px;
  line-height: 1.5;
  max-width: 245px;
  min-width: 230px;
}
.map__link {
  color: var(--primaryColor) !important;
}
.map__link:hover,
.map__link:active {
  color: var(--primaryColorDark) !important;
}
.map__me {
  margin: 10px;
}

  color: var(--primaryColor);
  cursor: pointer;
}
a:hover,
a:active {
  color: var(--primaryColorDark);
}
.noFormatLink {
  color: black;
}
.noFormatLink:hover,
.noFormatLink:active {
  color: black;
  text-decoration: none;
}
.input {
  border: none;
}
.input:visited,
.input:focus {
  box-shadow: 0 0 0px 0.2rem hsla(0, 0%, 0%, 0.3) !important;
}
.centerAlignText {
  text-align: center;
}
.marginBottom {
  margin-bottom: 10px;
}
.extraMarginBottom {
  margin-bottom: 30px;
}
.flexContainer {
  display: -ms-flex;
  display: -webkit-flex;
  display: flex;
}
.tooltip > .tooltip-inner {
  background-color: var(--tooltipBackgroundColor, #272727);
  color: var(--tooltipFontColor, white);
  border: 2px solid var(--tooltipBorderColor, black);
  box-shadow: 0 0 5px 0.2rem hsla(0, 0%, 0%, 0.3) !important;
}
.bs-tooltip-auto[x-placement^='bottom'] .arrow::before,
.bs-tooltip-bottom .arrow::before {
  border-bottom-color: var(--tooltipBorderColor, black);
}
.bs-tooltip-auto[x-placement^='top'] .arrow::before,
.bs-tooltip-top .arrow::before {
  border-top-color: var(--tooltipBorderColor, black);
}
.bs-tooltip-auto[x-placement^='left'] .arrow::before,
.bs-tooltip-left .arrow::before {
  border-left-color: var(--tooltipBorderColor, black);
}
.bs-tooltip-auto[x-placement^='right'] .arrow::before,
.bs-tooltip-right .arrow::before {
  border-right-color: var(--tooltipBorderColor, black);
}
.map__container {
  height: 400px;
  width: 100%;
  border: 1px solid grey;
  border-radius: 5px;
  margin: 10px 0px;
}
.map__icon {
  height: 75%;
  width: 75%;
}
.request-popup .leaflet-popup-content-wrapper {
  width: 100%;
}
.leaflet-popup-content {
  margin: 5px 25px 5px 5px;
  line-height: 1.5;
  max-width: 245px;
  min-width: 230px;
}
.map__link {
  color: var(--primaryColor) !important;
}
.map__link:hover,
.map__link:active {
  color: var(--primaryColorDark) !important;
}
.map__me {
  margin: 10px;
}
.languageList {
  padding: 0px;
}
.languageItem {
  border-radius: unset !important;
  border: none;
}
.languageItem--active {
  background-color: var(--primaryColor) !important;
  border-color: var(--primaryColor) !important;
}
.languageItem:hover,
.languageItem:active {
  background-color: var(--primaryColorVeryVeryLight);
}
.languageItem:focus,
.languageItem.visited {
  outline: 0px !important;
}
.languageItemText {
  margin: 0px 10px;

  color: black;
}
.noFormatLink:hover,
.noFormatLink:active {
  color: black;
  text-decoration: none;
}
.input {
  border: none;
}
.input:visited,
.input:focus {
  box-shadow: 0 0 0px 0.2rem hsla(0, 0%, 0%, 0.3) !important;
}
.centerAlignText {
  text-align: center;
}
.marginBottom {
  margin-bottom: 10px;
}
.extraMarginBottom {
  margin-bottom: 30px;
}
.flexContainer {
  display: -ms-flex;
  display: -webkit-flex;
  display: flex;
}
.tooltip > .tooltip-inner {
  background-color: var(--tooltipBackgroundColor, #272727);
  color: var(--tooltipFontColor, white);
  border: 2px solid var(--tooltipBorderColor, black);
  box-shadow: 0 0 5px 0.2rem hsla(0, 0%, 0%, 0.3) !important;
}
.bs-tooltip-auto[x-placement^='bottom'] .arrow::before,
.bs-tooltip-bottom .arrow::before {
  border-bottom-color: var(--tooltipBorderColor, black);
}
.bs-tooltip-auto[x-placement^='top'] .arrow::before,
.bs-tooltip-top .arrow::before {
  border-top-color: var(--tooltipBorderColor, black);
}
.bs-tooltip-auto[x-placement^='left'] .arrow::before,
.bs-tooltip-left .arrow::before {
  border-left-color: var(--tooltipBorderColor, black);
}
.bs-tooltip-auto[x-placement^='right'] .arrow::before,
.bs-tooltip-right .arrow::before {
  border-right-color: var(--tooltipBorderColor, black);
}
.map__container {
  height: 400px;
  width: 100%;
  border: 1px solid grey;
  border-radius: 5px;
  margin: 10px 0px;
}
.map__icon {
  height: 75%;
  width: 75%;
}
.request-popup .leaflet-popup-content-wrapper {
  width: 100%;
}
.leaflet-popup-content {
  margin: 5px 25px 5px 5px;
  line-height: 1.5;
  max-width: 245px;
  min-width: 230px;
}
.map__link {
  color: var(--primaryColor) !important;
}
.map__link:hover,
.map__link:active {
  color: var(--primaryColorDark) !important;
}
.map__me {
  margin: 10px;
}
.pageName {
  font-weight: bold;
}

  color: var(--primaryColor);
  cursor: pointer;
}
a:hover,
a:active {
  color: var(--primaryColorDark);

.noFormatLink {
  color: black;
}
.noFormatLink:hover,
.noFormatLink:active {
  color: black;
  text-decoration: none;
}
.input {
  border: none;
}
.input:visited,
.input:focus {
  box-shadow: 0 0 0px 0.2rem hsla(0, 0%, 0%, 0.3) !important;
}
.centerAlignText {
  text-align: center;
}
.marginBottom {
  margin-bottom: 10px;
}
.extraMarginBottom {
  margin-bottom: 30px;
}
.flexContainer {
  display: -ms-flex;
  display: -webkit-flex;
  display: flex;
}
.tooltip > .tooltip-inner {
  background-color: var(--tooltipBackgroundColor, #272727);
  color: var(--tooltipFontColor, white);
  border: 2px solid var(--tooltipBorderColor, black);
  box-shadow: 0 0 5px 0.2rem hsla(0, 0%, 0%, 0.3) !important;
}
.bs-tooltip-auto[x-placement^='bottom'] .arrow::before,
.bs-tooltip-bottom .arrow::before {
  border-bottom-color: var(--tooltipBorderColor, black);
}
.bs-tooltip-auto[x-placement^='top'] .arrow::before,
.bs-tooltip-top .arrow::before {
  border-top-color: var(--tooltipBorderColor, black);
}
.bs-tooltip-auto[x-placement^='left'] .arrow::before,
.bs-tooltip-left .arrow::before {
  border-left-color: var(--tooltipBorderColor, black);
}
.bs-tooltip-auto[x-placement^='right'] .arrow::before,
.bs-tooltip-right .arrow::before {
  border-right-color: var(--tooltipBorderColor, black);
}
.map__container {
  height: 400px;
  width: 100%;
  border: 1px solid grey;
  border-radius: 5px;
  margin: 10px 0px;
}
.map__icon {
  height: 75%;
  width: 75%;
}
.request-popup .leaflet-popup-content-wrapper {
  width: 100%;
}
.leaflet-popup-content {
  margin: 5px 25px 5px 5px;
  line-height: 1.5;
  max-width: 245px;
  min-width: 230px;
}
.map__link {
  color: var(--primaryColor) !important;
}
.map__link:hover,
.map__link:active {
  color: var(--primaryColorDark) !important;
}
.map__me {
  margin: 10px;
}
.textField:visited,
.textField:focus {
  box-shadow: 0 0 0px 0.2rem hsla(0, 0%, 0%, 0.3) !important;
}
@media screen and (max-width: 350px) {
  .recaptcha {
    transform: scale(0.777);
    -webkit-transform: scale(0.77);
    transform-origin: 0 0;
    -webkit-transform-origin: 0 0;
  }
}

  color: var(--primaryColor);
  cursor: pointer;
}
a:hover,
a:active {
  color: var(--primaryColorDark);
}
.noFormatLink {
  color: black;
}
.noFormatLink:hover,
.noFormatLink:active {
  color: black;
  text-decoration: none;
}
.input {
  border: none;
}
.input:visited,
.input:focus {
  box-shadow: 0 0 0px 0.2rem hsla(0, 0%, 0%, 0.3) !important;
}
.centerAlignText {
  text-align: center;
}
.marginBottom {
  margin-bottom: 10px;
}
.extraMarginBottom {
  margin-bottom: 30px;
}
.flexContainer {
  display: -ms-flex;
  display: -webkit-flex;
  display: flex;
}
.tooltip > .tooltip-inner {
  background-color: var(--tooltipBackgroundColor, #272727);
  color: var(--tooltipFontColor, white);
  border: 2px solid var(--tooltipBorderColor, black);
  box-shadow: 0 0 5px 0.2rem hsla(0, 0%, 0%, 0.3) !important;
}
.bs-tooltip-auto[x-placement^='bottom'] .arrow::before,
.bs-tooltip-bottom .arrow::before {
  border-bottom-color: var(--tooltipBorderColor, black);
}
.bs-tooltip-auto[x-placement^='top'] .arrow::before,
.bs-tooltip-top .arrow::before {
  border-top-color: var(--tooltipBorderColor, black);
}
.bs-tooltip-auto[x-placement^='left'] .arrow::before,
.bs-tooltip-left .arrow::before {
  border-left-color: var(--tooltipBorderColor, black);
}
.bs-tooltip-auto[x-placement^='right'] .arrow::before,
.bs-tooltip-right .arrow::before {
  border-right-color: var(--tooltipBorderColor, black);
}
.map__container {
  height: 400px;
  width: 100%;
  border: 1px solid grey;
  border-radius: 5px;
  margin: 10px 0px;
}
.map__icon {
  height: 75%;
  width: 75%;
}
.request-popup .leaflet-popup-content-wrapper {
  width: 100%;
}
.leaflet-popup-content {
  margin: 5px 25px 5px 5px;
  line-height: 1.5;
  max-width: 245px;
  min-width: 230px;
}
.map__link {
  color: var(--primaryColor) !important;
}
.map__link:hover,
.map__link:active {
  color: var(--primaryColorDark) !important;
}
.map__me {
  margin: 10px;
}
.textField:visited,
.textField:focus {
  box-shadow: 0 0 0px 0.2rem hsla(0, 0%, 0%, 0.3) !important;
}
@media screen and (max-width: 350px) {
  .recaptcha {
    transform: scale(0.777);
    -webkit-transform: scale(0.77);
    transform-origin: 0 0;
    -webkit-transform-origin: 0 0;
  }
}

  color: var(--primaryColor);
  cursor: pointer;
}
a:hover,
a:active {
  color: var(--primaryColorDark);
}
.noFormatLink {
  color: black;
}
.noFormatLink:hover,
.noFormatLink:active {
  color: black;
  text-decoration: none;
}
.input {
  border: none;
}
.input:visited,
.input:focus {
  box-shadow: 0 0 0px 0.2rem hsla(0, 0%, 0%, 0.3) !important;
}
.centerAlignText {
  text-align: center;
}
.marginBottom {
  margin-bottom: 10px;
}
.extraMarginBottom {
  margin-bottom: 30px;
}
.flexContainer {
  display: -ms-flex;
  display: -webkit-flex;
  display: flex;
}
.tooltip > .tooltip-inner {
  background-color: var(--tooltipBackgroundColor, #272727);
  color: var(--tooltipFontColor, white);
  border: 2px solid var(--tooltipBorderColor, black);
  box-shadow: 0 0 5px 0.2rem hsla(0, 0%, 0%, 0.3) !important;
}
.bs-tooltip-auto[x-placement^='bottom'] .arrow::before,
.bs-tooltip-bottom .arrow::before {
  border-bottom-color: var(--tooltipBorderColor, black);
}
.bs-tooltip-auto[x-placement^='top'] .arrow::before,
.bs-tooltip-top .arrow::before {
  border-top-color: var(--tooltipBorderColor, black);
}
.bs-tooltip-auto[x-placement^='left'] .arrow::before,
.bs-tooltip-left .arrow::before {
  border-left-color: var(--tooltipBorderColor, black);
}
.bs-tooltip-auto[x-placement^='right'] .arrow::before,
.bs-tooltip-right .arrow::before {
  border-right-color: var(--tooltipBorderColor, black);
}
.map__container {
  height: 400px;
  width: 100%;
  border: 1px solid grey;
  border-radius: 5px;
  margin: 10px 0px;
}
.map__icon {
  height: 75%;
  width: 75%;
}
.request-popup .leaflet-popup-content-wrapper {
  width: 100%;
}
.leaflet-popup-content {
  margin: 5px 25px 5px 5px;
  line-height: 1.5;
  max-width: 245px;
  min-width: 230px;
}
.map__link {
  color: var(--primaryColor) !important;
}
.map__link:hover,
.map__link:active {
  color: var(--primaryColorDark) !important;
}
.map__me {
  margin: 10px;
}
.header {
  background-color: var(--primaryColor);
  box-shadow: 0 0 5px 0.2rem hsla(0, 0%, 0%, 0.3) !important;
}
.headerIcon {
  color: var(--headerForegroundColor, white);
  font-size: 1.2em;
}
.headerTextLarge {
  font-family: 'Bree Serif', serif;
  color: var(--headerForegroundColor, white);
  margin: 0px 5px;
  font-size: 1.25em;
}
.headerFlag {
  vertical-align: bottom;
}

  color: var(--primaryColor);
  cursor: pointer;
}
a:hover,
a:active {
  color: var(--primaryColorDark);
}
.noFormatLink {
  color: black;
}
.noFormatLink:hover,
.noFormatLink:active {
  color: black;
  text-decoration: none;
}
.input {
  border: none;
}
.input:visited,
.input:focus {
  box-shadow: 0 0 0px 0.2rem hsla(0, 0%, 0%, 0.3) !important;
}
.centerAlignText {
  text-align: center;
}
.marginBottom {
  margin-bottom: 10px;
}
.extraMarginBottom {
  margin-bottom: 30px;
}
.flexContainer {
  display: -ms-flex;
  display: -webkit-flex;
  display: flex;
}
.tooltip > .tooltip-inner {
  background-color: var(--tooltipBackgroundColor, #272727);
  color: var(--tooltipFontColor, white);
  border: 2px solid var(--tooltipBorderColor, black);
  box-shadow: 0 0 5px 0.2rem hsla(0, 0%, 0%, 0.3) !important;
}
.bs-tooltip-auto[x-placement^='bottom'] .arrow::before,
.bs-tooltip-bottom .arrow::before {
  border-bottom-color: var(--tooltipBorderColor, black);
}
.bs-tooltip-auto[x-placement^='top'] .arrow::before,
.bs-tooltip-top .arrow::before {
  border-top-color: var(--tooltipBorderColor, black);
}
.bs-tooltip-auto[x-placement^='left'] .arrow::before,
.bs-tooltip-left .arrow::before {
  border-left-color: var(--tooltipBorderColor, black);
}
.bs-tooltip-auto[x-placement^='right'] .arrow::before,
.bs-tooltip-right .arrow::before {
  border-right-color: var(--tooltipBorderColor, black);
}
.map__container {
  height: 400px;
  width: 100%;
  border: 1px solid grey;
  border-radius: 5px;
  margin: 10px 0px;
}
.map__icon {
  height: 75%;
  width: 75%;
}
.request-popup .leaflet-popup-content-wrapper {
  width: 100%;
}
.leaflet-popup-content {
  margin: 5px 25px 5px 5px;
  line-height: 1.5;
  max-width: 245px;
  min-width: 230px;
}
.map__link {
  color: var(--primaryColor) !important;
}
.map__link:hover,
.map__link:active {
  color: var(--primaryColorDark) !important;
}
.map__me {
  margin: 10px;
}
.footer {
  background-color: var(--secondaryColor, hsl(0, 0%, 93%));
  justify-content: center;
  vertical-align: bottom;
}
.footerIcon {
  color: var(--primaryColor);
  vertical-align: unset;
  font-size: 1.5em;
}
.footerIcon:hover,
.footerIcon:active {
  color: var(--primaryColorDark);
}
.footerText {
  font-size: 1em;
}
.footerCategoryIcon {
  flex: 0 0 36px;
  padding: 4px;
  height: 36px;
  color: white;
  border-radius: 5px 0px 0px 5px;
}
.footerCategoryText {
  flex: 1;
  background-color: white;
  color: black;
  font-size: 1em;
  border-radius: 0px 5px 5px 0px;
  padding: 6px 25px 0px 0px;
  text-align: center;
}
.wikiList__container {
  margin: 10px 0px;
  border-color: grey;
  cursor: pointer;
}
.wikiList__container:hover {
  box-shadow: 0 0 5px 0.2rem hsla(0, 0%, 50.19607843%, 0.3) !important;
}
.wikiList__header {
  padding: 0.25rem 0.5rem;
  background-color: #f3f1f1;
}
.wikiList__title {
  font-weight: bold;
}
.wikiList__body {
  padding: 0.5rem;
}
.wikiList__text {
  flex: 1;
  color: black;
  word-break: break-word;
}
.wikiList__icon {
  margin: 4px 0px;
  flex: 0 0 32px;
  color: black;

  color: var(--primaryColor);

  color: black;
}
.noFormatLink:hover,
.noFormatLink:active {
  color: black;
  text-decoration: none;
}
.input {
  border: none;
}
.input:visited,
.input:focus {
  box-shadow: 0 0 0px 0.2rem hsla(0, 0%, 0%, 0.3) !important;
}
.centerAlignText {
  text-align: center;
}
.marginBottom {
  margin-bottom: 10px;
}
.extraMarginBottom {
  margin-bottom: 30px;
}
.flexContainer {
  display: -ms-flex;
  display: -webkit-flex;
  display: flex;
}
.tooltip > .tooltip-inner {
  background-color: var(--tooltipBackgroundColor, #272727);
  color: var(--tooltipFontColor, white);
  border: 2px solid var(--tooltipBorderColor, black);
  box-shadow: 0 0 5px 0.2rem hsla(0, 0%, 0%, 0.3) !important;
}
.bs-tooltip-auto[x-placement^='bottom'] .arrow::before,
.bs-tooltip-bottom .arrow::before {
  border-bottom-color: var(--tooltipBorderColor, black);
}
.bs-tooltip-auto[x-placement^='top'] .arrow::before,
.bs-tooltip-top .arrow::before {
  border-top-color: var(--tooltipBorderColor, black);
}
.bs-tooltip-auto[x-placement^='left'] .arrow::before,
.bs-tooltip-left .arrow::before {
  border-left-color: var(--tooltipBorderColor, black);
}
.bs-tooltip-auto[x-placement^='right'] .arrow::before,
.bs-tooltip-right .arrow::before {
  border-right-color: var(--tooltipBorderColor, black);
}
.map__container {
  height: 400px;
  width: 100%;
  border: 1px solid grey;
  border-radius: 5px;
  margin: 10px 0px;
}
.map__icon {
  height: 75%;
  width: 75%;
}
.request-popup .leaflet-popup-content-wrapper {
  width: 100%;
}
.leaflet-popup-content {
  margin: 5px 25px 5px 5px;
  line-height: 1.5;
  max-width: 245px;
  min-width: 230px;
}
.map__link {
  color: var(--primaryColor) !important;
}
.map__link:hover,
.map__link:active {
  color: var(--primaryColorDark) !important;
}
.map__me {
  margin: 10px;
}

  color: var(--primaryColor);
  cursor: pointer;
}
a:hover,
a:active {
  color: var(--primaryColorDark);
}
.noFormatLink {
  color: black;
}
.noFormatLink:hover,
.noFormatLink:active {
  color: black;
  text-decoration: none;
}
.input {
  border: none;
}
.input:visited,
.input:focus {
  box-shadow: 0 0 0px 0.2rem hsla(0, 0%, 0%, 0.3) !important;
}
.centerAlignText {
  text-align: center;
}
.marginBottom {
  margin-bottom: 10px;
}
.extraMarginBottom {
  margin-bottom: 30px;
}
.flexContainer {
  display: -ms-flex;
  display: -webkit-flex;
  display: flex;
}
.tooltip > .tooltip-inner {
  background-color: var(--tooltipBackgroundColor, #272727);
  color: var(--tooltipFontColor, white);
  border: 2px solid var(--tooltipBorderColor, black);
  box-shadow: 0 0 5px 0.2rem hsla(0, 0%, 0%, 0.3) !important;
}
.bs-tooltip-auto[x-placement^='bottom'] .arrow::before,
.bs-tooltip-bottom .arrow::before {
  border-bottom-color: var(--tooltipBorderColor, black);
}
.bs-tooltip-auto[x-placement^='top'] .arrow::before,
.bs-tooltip-top .arrow::before {
  border-top-color: var(--tooltipBorderColor, black);
}
.bs-tooltip-auto[x-placement^='left'] .arrow::before,
.bs-tooltip-left .arrow::before {
  border-left-color: var(--tooltipBorderColor, black);
}
.bs-tooltip-auto[x-placement^='right'] .arrow::before,
.bs-tooltip-right .arrow::before {
  border-right-color: var(--tooltipBorderColor, black);
}
.map__container {
  height: 400px;
  width: 100%;
  border: 1px solid grey;
  border-radius: 5px;
  margin: 10px 0px;
}
.map__icon {
  height: 75%;
  width: 75%;
}
.request-popup .leaflet-popup-content-wrapper {
  width: 100%;
}
.leaflet-popup-content {
  margin: 5px 25px 5px 5px;
  line-height: 1.5;
  max-width: 245px;
  min-width: 230px;
}
.map__link {
  color: var(--primaryColor) !important;
}
.map__link:hover,
.map__link:active {
  color: var(--primaryColorDark) !important;
}
.map__me {
  margin: 10px;
}
.infoTitle__container {
  border-radius: 5px;
  margin: 0px 0px 10px 0px;
}
.infoTitle__text {
  flex: 1;
  background-color: var(--primaryColorVeryVeryLight);
  color: black;
  font-weight: bold;
  border-radius: 0px 5px 5px 0px;
  border: 1px solid var(--primaryColor);
  padding: 6px 25px 0px 0px;
  text-align: center;
}
.infoTitle__icon {
  flex: 0 0 36px;
  padding: 4px;
  height: 36px;
  background-color: var(--primaryColor);
  color: white;
  border: 1px solid var(--primaryColor);
  border-radius: 5px 0px 0px 5px;
}

  color: var(--primaryColor);
  cursor: pointer;
}
a:hover,
a:active {
  color: var(--primaryColorDark);
}
.noFormatLink {
  color: black;
}
.noFormatLink:hover,
.noFormatLink:active {
  color: black;
  text-decoration: none;
}
.input {
  border: none;
}
.input:visited,
.input:focus {
  box-shadow: 0 0 0px 0.2rem hsla(0, 0%, 0%, 0.3) !important;
}
.centerAlignText {
  text-align: center;
}
.marginBottom {
  margin-bottom: 10px;
}
.extraMarginBottom {
  margin-bottom: 30px;
}
.flexContainer {
  display: -ms-flex;
  display: -webkit-flex;
  display: flex;
}
.tooltip > .tooltip-inner {
  background-color: var(--tooltipBackgroundColor, #272727);
  color: var(--tooltipFontColor, white);
  border: 2px solid var(--tooltipBorderColor, black);
  box-shadow: 0 0 5px 0.2rem hsla(0, 0%, 0%, 0.3) !important;
}
.bs-tooltip-auto[x-placement^='bottom'] .arrow::before,
.bs-tooltip-bottom .arrow::before {
  border-bottom-color: var(--tooltipBorderColor, black);
}
.bs-tooltip-auto[x-placement^='top'] .arrow::before,
.bs-tooltip-top .arrow::before {
  border-top-color: var(--tooltipBorderColor, black);
}
.bs-tooltip-auto[x-placement^='left'] .arrow::before,
.bs-tooltip-left .arrow::before {
  border-left-color: var(--tooltipBorderColor, black);
}
.bs-tooltip-auto[x-placement^='right'] .arrow::before,
.bs-tooltip-right .arrow::before {
  border-right-color: var(--tooltipBorderColor, black);
}
.map__container {
  height: 400px;
  width: 100%;
  border: 1px solid grey;
  border-radius: 5px;
  margin: 10px 0px;
}
.map__icon {
  height: 75%;
  width: 75%;
}
.request-popup .leaflet-popup-content-wrapper {
  width: 100%;
}
.leaflet-popup-content {
  margin: 5px 25px 5px 5px;
  line-height: 1.5;
  max-width: 245px;
  min-width: 230px;
}
.map__link {
  color: var(--primaryColor) !important;
}
.map__link:hover,
.map__link:active {
  color: var(--primaryColorDark) !important;
}
.map__me {
  margin: 10px;
}
.itemList__container {
  margin: 10px 0px;
  border-color: grey;
  cursor: pointer;
}
.itemList__container--open {
  border-color: green;
}
.itemList__container--closed {
  border-color: red;
}
.itemList__container:hover {
  box-shadow: 0 0 5px 0.2rem hsla(0, 0%, 50.19607843%, 0.3) !important;
}
.itemList__container--open:hover {
  box-shadow: 0 0 5px 0.2rem hsla(120, 100%, 25.09803922%, 0.3) !important;
}
.itemList__container--closed:hover {
  box-shadow: 0 0 5px 0.2rem hsla(0, 100%, 50%, 0.3) !important;
}
.itemList__header {
  padding: 0.25rem 0.5rem;
  background-color: #f3f1f1;
}
.itemList__header--open {
  background-color: #def9de;
}
.itemList__header--closed {
  background-color: #ffe9e9;
}
.itemList__title {
  font-weight: bold;
}
.itemList__body {
  padding: 0.5rem;
}
.itemList__text {
  flex: 1;
  color: black;
  word-break: break-word;
}
.itemList__text--open {
  font-weight: bold;
  color: green;
}
.itemList__text--closed {
  font-weight: bold;
  color: red;
}
.itemList__icon {
  margin: 4px 0px;
  flex: 0 0 32px;
  color: black;
}
.itemList__icon--open {
  color: green;
}
.itemList__icon--closed {
  color: red;
}
.itemList__pagination {
  margin: 10px 0px;

  color: black;

}

  text-align: center;
}

  margin-bottom: 10px;

  display: -ms-flex;

  display: flex;

  background-color: var(--tooltipBackgroundColor, #272727);
  color: var(--tooltipFontColor, white);

  box-shadow: 0 0 5px 0.2rem hsla(0, 0%, 0%, 0.3) !important;
}

.bs-tooltip-bottom .arrow::before {
  border-bottom-color: var(--tooltipBorderColor, black);

.bs-tooltip-top .arrow::before {
  border-top-color: var(--tooltipBorderColor, black);

  border-left-color: var(--tooltipBorderColor, black);

.bs-tooltip-right .arrow::before {
  border-right-color: var(--tooltipBorderColor, black);

.map__link:active {
  color: var(--primaryColorDark) !important;
}
.map__me {
  margin: 10px;

  color: black;

.input {

}

  box-shadow: 0 0 0px 0.2rem hsla(0, 0%, 0%, 0.3) !important;
}

  text-align: center;
}
.marginBottom {
  margin-bottom: 10px;
}

  margin-bottom: 30px;

  display: -ms-flex;
  display: -webkit-flex;
  display: flex;
}

  background-color: var(--tooltipBackgroundColor, #272727);
  color: var(--tooltipFontColor, white);

  box-shadow: 0 0 5px 0.2rem hsla(0, 0%, 0%, 0.3) !important;
}

.bs-tooltip-bottom .arrow::before {
  border-bottom-color: var(--tooltipBorderColor, black);

.bs-tooltip-top .arrow::before {
  border-top-color: var(--tooltipBorderColor, black);
}
.bs-tooltip-auto[x-placement^='left'] .arrow::before,
.bs-tooltip-left .arrow::before {
  border-left-color: var(--tooltipBorderColor, black);
}
.bs-tooltip-auto[x-placement^='right'] .arrow::before,
.bs-tooltip-right .arrow::before {
  border-right-color: var(--tooltipBorderColor, black);
}

  max-width: 245px;
  min-width: 230px;
}
.map__link {
  color: var(--primaryColor) !important;
}
.map__link:hover,
.map__link:active {
  color: var(--primaryColorDark) !important;
}
.map__me {
  margin: 10px;
}

  color: var(--primaryColor);
  cursor: pointer;
}
a:hover,
a:active {
  color: var(--primaryColorDark);
}
.noFormatLink {
  color: black;
}
.noFormatLink:hover,
.noFormatLink:active {
  color: black;
  text-decoration: none;
}
.input {
  border: none;
}
.input:visited,
.input:focus {
  box-shadow: 0 0 0px 0.2rem hsla(0, 0%, 0%, 0.3) !important;
}
.centerAlignText {
  text-align: center;
}
.marginBottom {
  margin-bottom: 10px;
}
.extraMarginBottom {
  margin-bottom: 30px;
}
.flexContainer {
  display: -ms-flex;
  display: -webkit-flex;
  display: flex;
}
.tooltip > .tooltip-inner {
  background-color: var(--tooltipBackgroundColor, #272727);
  color: var(--tooltipFontColor, white);
  border: 2px solid var(--tooltipBorderColor, black);
  box-shadow: 0 0 5px 0.2rem hsla(0, 0%, 0%, 0.3) !important;
}
.bs-tooltip-auto[x-placement^='bottom'] .arrow::before,
.bs-tooltip-bottom .arrow::before {
  border-bottom-color: var(--tooltipBorderColor, black);
}
.bs-tooltip-auto[x-placement^='top'] .arrow::before,
.bs-tooltip-top .arrow::before {
  border-top-color: var(--tooltipBorderColor, black);
}
.bs-tooltip-auto[x-placement^='left'] .arrow::before,
.bs-tooltip-left .arrow::before {
  border-left-color: var(--tooltipBorderColor, black);
}
.bs-tooltip-auto[x-placement^='right'] .arrow::before,
.bs-tooltip-right .arrow::before {
  border-right-color: var(--tooltipBorderColor, black);
}
.map__container {
  height: 400px;
  width: 100%;
  border: 1px solid grey;
  border-radius: 5px;
  margin: 10px 0px;
}
.map__icon {
  height: 75%;
  width: 75%;
}
.request-popup .leaflet-popup-content-wrapper {
  width: 100%;
}
.leaflet-popup-content {
  margin: 5px 25px 5px 5px;
  line-height: 1.5;
  max-width: 245px;
  min-width: 230px;
}
.map__link {
  color: var(--primaryColor) !important;
}
.map__link:hover,
.map__link:active {
  color: var(--primaryColorDark) !important;
}
.map__me {
  margin: 10px;
}
.placeList__main {
  margin: 10px 0px;
}

.map__container {
  height: 400px;
  width: 100%;
  border: 1px solid grey;
  border-radius: 5px;
  margin: 10px 0px;
}
.map__icon {
  height: 75%;
  width: 75%;
}
.request-popup .leaflet-popup-content-wrapper {
  width: 100%;

  margin: 5px 25px 5px 5px;
  line-height: 1.5;
  max-width: 245px;
  min-width: 230px;
}
.map__link {
  color: var(--primaryColor) !important;
}
.map__link:hover,
.map__link:active {
  color: var(--primaryColorDark) !important;
}
.map__me {
  margin: 10px;
}

  color: black;
}

  color: green;
}
.item__text--closed {
  color: red;
}

  font-weight: bold;
}

  margin-right: 5px;

}
.item__icon--open {
  color: green;
}
.item__icon--closed {
  color: red;
}
.item_info {
  margin: 10px 0px;
}
.item__table--center {
  margin: 10px auto;
}
.item__hoursContainer {
  margin-bottom: 10px;
}
.item__priceRangeIcon {

}
.item__priceRangeIcon--full {
  color: black;
}
.item__priceRangeIcon--empty {
  color: lightgray;
}

  font-size: 2rem;
}
.item__ratingIcon--full {
  color: black;
}
.item__ratingIcon--empty {
  color: lightgray;
}
.item__paymentOptionsIcon {
  font-size: 2rem;
}
.item__post {
  margin-bottom: 10px;
  word-break: break-word;
}
.item__date {
  font-style: italic;
  font-weight: bold;
}
.item__image {
  max-width: 100%;

  margin: 10px 0px;

  color: var(--primaryColor);
  cursor: pointer;
}
a:hover,
a:active {
  color: var(--primaryColorDark);
}
.noFormatLink {
  color: black;
}
.noFormatLink:hover,
.noFormatLink:active {
  color: black;
  text-decoration: none;
}
.input {
  border: none;
}
.input:visited,
.input:focus {
  box-shadow: 0 0 0px 0.2rem hsla(0, 0%, 0%, 0.3) !important;
}
.centerAlignText {
  text-align: center;
}
.marginBottom {
  margin-bottom: 10px;
}
.extraMarginBottom {
  margin-bottom: 30px;
}
.flexContainer {
  display: -ms-flex;
  display: -webkit-flex;
  display: flex;
}
.tooltip > .tooltip-inner {
  background-color: var(--tooltipBackgroundColor, #272727);
  color: var(--tooltipFontColor, white);
  border: 2px solid var(--tooltipBorderColor, black);
  box-shadow: 0 0 5px 0.2rem hsla(0, 0%, 0%, 0.3) !important;
}
.bs-tooltip-auto[x-placement^='bottom'] .arrow::before,
.bs-tooltip-bottom .arrow::before {
  border-bottom-color: var(--tooltipBorderColor, black);
}
.bs-tooltip-auto[x-placement^='top'] .arrow::before,
.bs-tooltip-top .arrow::before {
  border-top-color: var(--tooltipBorderColor, black);
}
.bs-tooltip-auto[x-placement^='left'] .arrow::before,
.bs-tooltip-left .arrow::before {
  border-left-color: var(--tooltipBorderColor, black);
}
.bs-tooltip-auto[x-placement^='right'] .arrow::before,
.bs-tooltip-right .arrow::before {
  border-right-color: var(--tooltipBorderColor, black);
}
.map__container {
  height: 400px;
  width: 100%;
  border: 1px solid grey;
  border-radius: 5px;
  margin: 10px 0px;
}
.map__icon {
  height: 75%;
  width: 75%;
}
.request-popup .leaflet-popup-content-wrapper {
  width: 100%;
}
.leaflet-popup-content {
  margin: 5px 25px 5px 5px;
  line-height: 1.5;
  max-width: 245px;
  min-width: 230px;
}
.map__link {
  color: var(--primaryColor) !important;
}
.map__link:hover,
.map__link:active {
  color: var(--primaryColorDark) !important;
}
.map__me {
  margin: 10px;

.noFormatLink {
  color: black;
}
.noFormatLink:hover,
.noFormatLink:active {
  color: black;
  text-decoration: none;
}
.input {
  border: none;
}
.input:visited,

  box-shadow: 0 0 0px 0.2rem hsla(0, 0%, 0%, 0.3) !important;
}
.centerAlignText {
  text-align: center;
}
.marginBottom {
  margin-bottom: 10px;
}
.extraMarginBottom {
  margin-bottom: 30px;
}
.flexContainer {
  display: -ms-flex;
  display: -webkit-flex;
  display: flex;
}
.tooltip > .tooltip-inner {
  background-color: var(--tooltipBackgroundColor, #272727);
  color: var(--tooltipFontColor, white);
  border: 2px solid var(--tooltipBorderColor, black);
  box-shadow: 0 0 5px 0.2rem hsla(0, 0%, 0%, 0.3) !important;
}
.bs-tooltip-auto[x-placement^='bottom'] .arrow::before,
.bs-tooltip-bottom .arrow::before {
  border-bottom-color: var(--tooltipBorderColor, black);
}
.bs-tooltip-auto[x-placement^='top'] .arrow::before,
.bs-tooltip-top .arrow::before {
  border-top-color: var(--tooltipBorderColor, black);
}
.bs-tooltip-auto[x-placement^='left'] .arrow::before,
.bs-tooltip-left .arrow::before {
  border-left-color: var(--tooltipBorderColor, black);
}
.bs-tooltip-auto[x-placement^='right'] .arrow::before,
.bs-tooltip-right .arrow::before {
  border-right-color: var(--tooltipBorderColor, black);
}

  height: 400px;
  width: 100%;
  border: 1px solid grey;
  border-radius: 5px;
  margin: 10px 0px;
}
.map__icon {
  height: 75%;
  width: 75%;
}
.request-popup .leaflet-popup-content-wrapper {
  width: 100%;
}
.leaflet-popup-content {
  margin: 5px 25px 5px 5px;
  line-height: 1.5;
  max-width: 245px;
  min-width: 230px;
}
.map__link {
  color: var(--primaryColor) !important;
}
.map__link:hover,
.map__link:active {
  color: var(--primaryColorDark) !important;
}
.map__me {
  margin: 10px;
}
.categories__filter {
  margin: 5px 0px;
  border: 1px solid gray;
}
.categories__filter:visited,
.categories__filter:focus {

  box-shadow: 0 0 0px 0rem hsla(0, 0%, 0%, 0.3) !important;
